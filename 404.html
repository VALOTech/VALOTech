<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page not found | VALO Tech</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#0D5A54" />
  <style>
    *{margin:0;box-sizing:border-box}
    body{min-height:100dvh;display:grid;place-items:center;text-align:center;padding:24px;
      background:#0D5A54;color:#fff;
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.6}
    .code{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:.8rem;letter-spacing:.18em;
      text-transform:uppercase;color:#62E2BC;margin-bottom:18px}
    h1{font-size:clamp(1.6rem,5vw,2.4rem);letter-spacing:-.02em;margin-bottom:14px}
    p{color:rgba(255,255,255,.8);max-width:42ch;margin:0 auto 28px}
    a{display:inline-block;background:#fff;color:#0D5A54;font-weight:600;text-decoration:none;
      padding:13px 24px;border-radius:10px;transition:transform .15s}
    a:hover{transform:translateY(-1px)}
  </style>
</head>
<body>
  <main>
    <div class="code">Error 404</div>
    <h1>This page could not be found</h1>
    <p>The page you are looking for may have moved. Let us take you back to the homepage.</p>
    <a href="/">Return home</a>
  </main>
</body>
</html>
